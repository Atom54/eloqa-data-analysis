      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }

            "session": {"cells": [{"code_hash": "243d4bd0e9c5a2b1e60b731b0f92eb3d", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "6b0ac01788571af9b3314766a2b54aae", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"1-conversion-paywall-trial\"\u003E1\ufe0f\u20e3 Conversion Paywall \u2192 Trial\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFibery :\u003C/strong\u003E #4358\n\u003Cstrong\u003EQuestion :\u003C/strong\u003E Quel pourcentage des utilisateurs qui voient le paywall d'onboarding lance un essai gratuit ?\n\u003Cstrong\u003EP\u00e9riode :\u003C/strong\u003E Septembre 2025 \u2013 F\u00e9vrier 2026\u003C/span\u003E\n\u003Chr /\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a1bf309ab19d99207b95fd981ce24171", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"methodologie\"\u003E\ud83d\udccb M\u00e9thodologie\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3fabf1a606c3a463a0f8ec6681a797af", "console": [], "id": "bkHC", "outputs": [{"data": {"text/html": "\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Sources \u0026amp;amp; Variables (cliquer pour d\u00e9plier)\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ESources :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EDB Eloqa\u003C/strong\u003E \u2014 Table \u003Ccode\u003EPayEvent\u003C/code\u003E : \u00e9v\u00e9nements d'achat/trial/annulation envoy\u00e9s par RevenueCat webhook\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EAmplitude\u003C/strong\u003E (Sep-Dec 2025) \u2014 Events app-side : \u003Ccode\u003EScreen MultiStepsPaywall Viewed\u003C/code\u003E, \u003Ccode\u003ERC Trial Started\u003C/code\u003E, \u003Ccode\u003EPaywall Close Cross Clicked\u003C/code\u003E, \u003Ccode\u003EScreen Discount Paywall Viewed\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EPostHog\u003C/strong\u003E (F\u00e9v 2026+) \u2014 M\u00eames events apr\u00e8s migration analytics\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EVariables cl\u00e9s :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.type\u003C/code\u003E = \u003Ccode\u003EINITIAL_PURCHASE\u003C/code\u003E \u2192 premier achat ou d\u00e9marrage de trial\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.periodType\u003C/code\u003E = \u003Ccode\u003ETRIAL\u003C/code\u003E \u2192 p\u00e9riode d'essai gratuit\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.productId\u003C/code\u003E \u2192 identifie le plan (annuel \u003Ccode\u003Eabo_ann_v3_*\u003C/code\u003E vs mensuel \u003Ccode\u003Eabo_men_v3_*\u003C/code\u003E)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.purchasedAtMs\u003C/code\u003E \u2192 timestamp de l'achat c\u00f4t\u00e9 store\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.countryCode\u003C/code\u003E \u2192 pays de l'utilisateur\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ELimites :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EAmplitude et PostHog sont des comptages d'events analytics (pas la DB). Le croisement se fait par coh\u00e9rence des ratios, pas par user ID commun\u003C/li\u003E\n\u003Cli\u003ELe taux exact d\u00e9pend du window de tracking \u2014 un user peut voir le paywall et convertir des jours plus tard\u003C/li\u003E\n\u003Cli\u003EPostHog avant mi-f\u00e9vrier 2026 = donn\u00e9es parcellaires (migration en cours)\u003C/li\u003E\n\u003Cli\u003ELe discount paywall est un 2e affichage pour les users qui ferment le 1er \u2192 population biais\u00e9e (d\u00e9j\u00e0 dit non une fois)\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E"}, "type": "data"}]}, {"code_hash": "255289ffa5feadfc4513cdeb2600a5e0", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"funnel-du-paywall-donboarding\"\u003E\ud83d\udcca Funnel du paywall d'onboarding\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "b92e7c92ccb32153ba5fd2d6a770ead4", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cmarimo-plotly data-figure='{\u0026quot;data\u0026quot;:[{\u0026quot;connector\u0026quot;:{\u0026quot;line\u0026quot;:{\u0026quot;color\u0026quot;:\u0026quot;royalblue\u0026quot;,\u0026quot;width\u0026quot;:1}},\u0026quot;marker\u0026quot;:{\u0026quot;color\u0026quot;:[\u0026quot;#6C5CE7\u0026quot;,\u0026quot;#a29bfe\u0026quot;,\u0026quot;#fd79a8\u0026quot;,\u0026quot;#00cec9\u0026quot;,\u0026quot;#fdcb6e\u0026quot;]},\u0026quot;textinfo\u0026quot;:\u0026quot;value+percent initial\u0026quot;,\u0026quot;x\u0026quot;:[5740,3786,1289,420,383],\u0026quot;y\u0026quot;:[\u0026quot;Paywall vu\u0026quot;,\u0026quot;Croix cliqu\u00e9e\u0026quot;,\u0026quot;Voir toutes les offres\u0026quot;,\u0026quot;Achat valid\u00e9\u0026quot;,\u0026quot;Trial d\u00e9marr\u00e9\u0026quot;],\u0026quot;type\u0026quot;:\u0026quot;funnel\u0026quot;}],\u0026quot;layout\u0026quot;:{\u0026quot;template\u0026quot;:{\u0026quot;data\u0026quot;:{\u0026quot;histogram2dcontour\u0026quot;:[{\u0026quot;type\u0026quot;:\u0026quot;histogram2dcontour\u0026quot;,\u0026quot;colorbar\u0026quot;:{\u0026quot;outlinewidth\u0026quot;:0,\u0026quot;ticks\u0026quot;:\u0026quot;\u0026quo \u00e9clench\u00e9s pendant l\u0026amp;#x27;onboarding, **avant m\u00eame de voir l\u0026amp;#x27;\u00e9cran Home**.\u0026#92;n\u0026#92;nLe paywall est le **premier** \u00e9cran impactant du parcours utilisateur. Les users qui passent = fortement engag\u00e9s d\u00e8s le d\u00e9part.  \u0026#92;nLes 65% qui ferment n\u0026amp;#x27;ont m\u00eame pas encore vu le produit \u2192 l\u0026amp;#x27;offre est pr\u00e9sent\u00e9e trop t\u00f4t pour eux.\u0026#92;n\u0026lt;/span\u0026gt;\u0026quot;' data-kind='\u0026quot;info\u0026quot;'\u003E\u003C/marimo-callout-output\u003E"}, "type": "data"}]}, {"code_hash": "be4a47b06c418cf0817b850e66392b5b", "console": [], "id": "ROlb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch2 id=\"hypotheses-conclusions\"\u003E\ud83d\udca1 Hypoth\u00e8ses \u0026amp; Conclusions\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EHypoth\u00e8se 1 :\u003C/strong\u003E Le paywall est trop t\u00f4t dans le parcours \u2192 les users n'ont pas encore vu la valeur du produit\n\u2705 \u003Cstrong\u003EConfirm\u00e9\u003C/strong\u003E \u2014 95% des trials viennent de l'onboarding, avant Home\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EHypoth\u00e8se 2 :\u003C/strong\u003E Le discount paywall r\u00e9cup\u00e8re les ind\u00e9cis\n\u274c \u003Cstrong\u003EInfirm\u00e9\u003C/strong\u003E \u2014 3x moins de conversion (2.2% vs 6.7%). Population d\u00e9j\u00e0 auto-s\u00e9lectionn\u00e9e comme non-int\u00e9ress\u00e9e\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EHypoth\u00e8se 3 :\u003C/strong\u003E Le taux de conversion est en d\u00e9clin\n\u274c \u003Cstrong\u003EInfirm\u00e9\u003C/strong\u003E \u2014 6.5-6.7% stable depuis septembre 2025\u003C/span\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ERecommandation :\u003C/strong\u003E Tester un \u003Cstrong\u003Ebouton cadeau sur la Home\u003C/strong\u003E (offre annuelle \u00e0 \u20ac40) pour re-engager les 65% qui ferment le paywall apr\u00e8s avoir utilis\u00e9 l'app. Canal de conversion = 0 aujourd'hui.\u003C/span\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E\ud83d\udcca Analyse par Quanty \u2014 Sprint F\u00e9v 2026\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.20.1"}, "version": "1"},
