      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "2b76fcfa9652f63170564cedc74fb073", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "63448133f17af7d627e8645de8e06574", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"rapport-de-segmentation-utilisateurs-eloqa\"\u003E\ud83d\udcca Rapport de segmentation utilisateurs \u2014 Eloqa\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDate :\u003C/strong\u003E Mars 2026\n\u003Cstrong\u003EP\u00e9riode d'analyse :\u003C/strong\u003E Septembre 2025 \u2013 F\u00e9vrier 2026\n\u003Cstrong\u003EAuteur :\u003C/strong\u003E Quanty (Data Analyst)\u003C/span\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003ECe rapport segmente les utilisateurs payants et actifs d'Eloqa selon les r\u00e9ponses \u00e0 l'onboarding :\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003ELangue du contenu\u003C/strong\u003E (\u003Ccode\u003EcontentLanguage\u003C/code\u003E) : version FR vs EN de l'app\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ELangue maternelle\u003C/strong\u003E (\u003Ccode\u003EisMotherTongue\u003C/code\u003E) : francophone natif vs apprenant FLE\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ERaison d'installation\u003C/strong\u003E (\u003Ccode\u003EreasonForInstall\u003C/code\u003E) : motivation principale\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ENiveau auto-\u00e9valu\u00e9\u003C/strong\u003E (\u003Ccode\u003EselfGivenFluencyLevel\u003C/code\u003E) : 1 (d\u00e9butant) / 2 (interm\u00e9diaire) / 3 (avanc\u00e9)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ETranche d'\u00e2ge\u003C/strong\u003E (\u003Ccode\u003EageRange\u003C/code\u003E)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ESource d'acquisition\u003C/strong\u003E (\u003Ccode\u003EcameFrom\u003C/code\u003E)\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a1bf309ab19d99207b95fd981ce24171", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"methodologie\"\u003E\ud83d\udccb M\u00e9thodologie\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "14e0993db2b26d968be3ef94a0e31c78", "console": [], "id": "bkHC", "outputs": [{"data": {"text/html": "\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Sources \u0026amp;amp; Variables (cliquer pour d\u00e9plier)\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ESources :\u003C/strong\u003E DB Eloqa \u2014 Tables \u003Ccode\u003EUser\u003C/code\u003E, \u003Ccode\u003EPayEvent\u003C/code\u003E, \u003Ccode\u003EReviewSession\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ESegmentation bas\u00e9e sur les champs remplis pendant l'onboarding :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003EcontentLanguage\u003C/code\u003E (fr/en) \u2014 version de l'app choisie par l'utilisateur\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EisMotherTongue\u003C/code\u003E (boolean) \u2014 \"Le fran\u00e7ais est-il votre langue maternelle ?\"\u003C/li\u003E\n\u003Cli\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EreasonForInstall\u003C/code\u003E (enum) \u2014 \"Pourquoi avez-vous install\u00e9 Eloqa ?\"\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EBETTER_COMMUNICATION, NEW_WORDS, FORMAL_LANGUAGE, EXAM, MEMORY, FIND_WORDS, OTHER\u003C/li\u003E\n\u003C/ul\u003E\n\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EselfGivenFluencyLevel\u003C/code\u003E (1/2/3) \u2014 auto-\u00e9valuation du niveau\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EageRange\u003C/code\u003E (enum) \u2014 tranche d'\u00e2ge d\u00e9clar\u00e9e\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EcameFrom\u003C/code\u003E (text) \u2014 \"Comment avez-vous connu Eloqa ?\"\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EM\u00e9triques calcul\u00e9es par segment :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ENombre de payants (2 derniers mois) et revenu\u003C/li\u003E\n\u003Cli\u003ETaux de conversion trial \u2192 payant\u003C/li\u003E\n\u003Cli\u003ER\u00e9tention D14 et D30\u003C/li\u003E\n\u003Cli\u003ENombre moyen de sessions\u003C/li\u003E\n\u003Cli\u003ETaux de r\u00e9ussite (m\u00e9morisation)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ELimites :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ETous les champs ne sont pas renseign\u00e9s pour tous les users (surtout les anciens)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EisMotherTongue\u003C/code\u003E n'est rempli que pour ~54% des users\u003C/li\u003E\n\u003Cli\u003ELa raison d'installation n'est renseign\u00e9e que pour ~45% des users\u003C/li\u003E\n\u003Cli\u003ELes segments sont crois\u00e9s mais pas n\u00e9cessairement ind\u00e9pendants\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E"}, "type": "data"}]}, {"code_hash": "1de02cf2aa69e748ec3b69b5eb775e26", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch1 id=\"1-version-francaise-vs-anglaise\"\u003E1\ufe0f\u20e3 Version fran\u00e7aise vs anglaise\u003C/h1\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c8e152071ccddba7dc4210e586645ac0", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cdiv style 9croche 3x plus vite\u003C/strong\u003E\n0.8% des inscrits EN atteignent 10 sessions vs 2.2% FR. Et ceux qui restent ont un taux de r\u00e9ussite \u003Cstrong\u003E2x plus bas\u003C/strong\u003E (42% vs 89%) \u2014 signal fort que le contenu EN est mal calibr\u00e9.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003E3. Les francophones natifs convertissent mieux que les FLE\u003C/strong\u003E\nLe produit est con\u00e7u pour des natifs qui veulent s'am\u00e9liorer \u2014 les apprenants FLE sont un bonus, pas le c\u0153ur de cible.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003E4. La motivation \"Mieux communiquer\" domine massivement\u003C/strong\u003E\n66% des inscrits. C'est le positionnement qui r\u00e9sonne.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003E5. Les 25-44 ans sont le sweet spot\u003C/strong\u003E\nMeilleur \u00e9quilibre volume \u00d7 conversion \u00d7 r\u00e9tention. Les \u0026lt;18 ans ont du volume mais convertissent peu. Les 55+ retiennent bien mais sont peu nombreux.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003E6. ChatGPT comme source d'acquisition\u003C/strong\u003E\n636 users venus de ChatGPT \u2014 canal \u00e9mergent \u00e0 surveiller.\u003C/span\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E\ud83d\udcca Analyse par Quanty \u2014 Mars 2026\u003C/em\u003E\n\u003Cem\u003ESources : DB Eloqa (User, PayEvent, ReviewSession)\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.20.1"}, "version": "1"},
