    <script data-marimo="true">
      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch2 id=\"hypotheses-conclusions\"\u003E\ud83d\udca1 Hypoth\u00e8ses \u0026amp; Conclusions\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EHypoth\u00e8se 1 :\u003C/strong\u003E Les exercices sont trop difficiles, les users abandonnent en cours\n\u274c \u003Cstrong\u003EInfirm\u00e9\u003C/strong\u003E \u2014 74% abandonnent \u00e0 0 carte. Ils ne voient m\u00eame pas un exercice\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EHypoth\u00e8se 2 :\u003C/strong\u003E L'abandon est un probl\u00e8me de chargement ou de bug technique\n\u26a0\ufe0f \u003Cstrong\u003EPossible\u003C/strong\u003E \u2014 Un taux de 74% \u00e0 0 carte est anormalement haut. Certains abandons sont probablement des bugs (session cr\u00e9\u00e9e c\u00f4t\u00e9 serveur sans que l'UI se charge)\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EHypoth\u00e8se 3 :\u003C/strong\u003E Le taux d'abandon est stable\n\u274c \u003Cstrong\u003EInfirm\u00e9\u003C/strong\u003E \u2014 Baisse significative de 38% \u00e0 27% entre sept et f\u00e9v. L'am\u00e9lioration est r\u00e9elle et continue\u003C/span\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ERecommandations :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EInvestiguer les abandons \u00e0 0 carte\u003C/strong\u003E \u2014 distinguer abandon volontaire vs bug technique (ajouter un event analytics \u003Ccode\u003Esession_ui_loaded\u003C/code\u003E)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ECharger les premi\u00e8res cartes plus vite\u003C/strong\u003E \u2014 si c'est un probl\u00e8me de temps de chargement, \u00e7a explique les 74%\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EContinuer la tendance\u003C/strong\u003E \u2014 identifier quels changements r\u00e9cents ont caus\u00e9 la baisse (nouvelle UI ? meilleur onboarding ?)\
