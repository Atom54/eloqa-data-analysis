    <script data-marimo="true">
      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

3EApproche :\u003C/strong\u003E\u003C/span\u003E\n\u003Col\u003E\n\u003Cli\u003EIdentifier les activations de trial : \u003Ccode\u003Etype = 'INITIAL_PURCHASE'\u003C/code\u003E + \u003Ccode\u003EperiodType = 'TRIAL'\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003EIdentifier les annulations : \u003Ccode\u003Etype = 'CANCELLATION'\u003C/code\u003E + \u003Ccode\u003EperiodType = 'TRIAL'\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003EMatcher par \u003Ccode\u003EoriginalAppUserId\u003C/code\u003E et calculer le d\u00e9lai : \u003Ccode\u003EeventTimestampMs(CANCEL) - purchasedAtMs(INITIAL)\u003C/code\u003E\u003C/li\u003E\n\u003C/ol\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EVariables :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.type\u003C/code\u003E \u2014 type d'\u00e9v\u00e9nement (\u003Ccode\u003EINITIAL_PURCHASE\u003C/code\u003E, \u003Ccode\u003ECANCELLATION\u003C/code\u003E, \u003Ccode\u003ERENEWAL\u003C/code\u003E)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.periodType\u003C/code\u003E \u2014 \u003Ccode\u003ETRIAL\u003C/code\u003E ou \u003Ccode\u003ENORMAL\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.purchasedAtMs\u003C/code\u003E \u2014 timestamp de l'activation (c\u00f4t\u00e9 store)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.eventTimestampMs\u003C/code\u003E \u2014 timestamp de l'annulation (c\u00f4t\u00e9 RevenueCat)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.originalAppUserId\u003C/code\u003E \u2014 identifiant stable cross-device\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ELimites :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EAnnulation \u2260 non-conversion. Un user peut annuler (pour \u00e9viter le renouvellement auto) tout en utilisant le trial jusqu'\u00e0 expiration, puis renouveler manuellement\u003C/li\u003E\n\u003Cli\u003ELe timestamp d'annulation = notification RevenueCat, pas forc\u00e9ment le clic exact\u003C/li\u003E\n\u003Cli\u003ECertains users annulent via les settings iOS/Android, pas dans l'app\u003C/li\u003E\n\u003Cli\u003EFiltr\u00e9 sur trials annuels (\u003Ccode\u003EproductId LIKE '%ann%'\u003C/code\u003E) + \u003Ccode\u003Eenvironment = 'PRODUCTION'\u003C/code\u003E\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E"}, "type": "data"}]}, {"code_hash": "6da1b518076f88b7a90446cb097b188b", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"timing-des-annulations\"\u003E\ud83d\udcca Timing des annulations\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3398908e13fa310c0b66b482dbd6e743", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cmarimo-plotly data-figure='{\u0026quot;data\u0026quot;:[{\u0026quot;hovertemplate\u0026quot;:\u0026quot;D\u00e9lai=%{x}\u0026lt;br\u0026gt;Users=%{y}\u0026lt;br\u0026gt;pct=%{text}\u0026lt;extra\u0026gt;\u0026lt;/extra\u0026gt;\u0026quot;,\u0026quot;legendgroup\u0026quot;:\u0026quot;\u0026lt; 1h\u0026quot;,\u0026quot;marker\u0026quot;:{\u0026quot;color\u0026quot;:\u0026quot;#6C5CE7\u0026quot;,\u0026quot;pattern\u0026quot;:{\u0026quot;shape\u0026quot;:\u0026quot;\u0026quot;}},\u0026quot;name\u0026quot;:\u0026quot;\u0026lt; 1h\u0026quot;,\u0026quot;orientation\u0026quot;:\u0026quot;v\u0026quot;,\u0026quot;showlegend\u0026quot;:true,\u0026quot;text\u0026quot;:{\u0026quot;dtype\u0026quot;:\u0026quot;f8\u0026quot;,\u0026quot;bdata\u0026quot;:\u0026quot;mpmZmZkZPUA=\u0026quot;},\u0026quot;textposition\u0026quot;:\u0026quot;outside\u0026quot;,\u0026quot;x\u0026quot;:[\u0026quot;\u0026lt; 1h\u0026quot;],\u0026quot;xaxis\u0026quot;:\u0026quot;x\u0026quot;,\u0026quot;y\u0026quot;:{\u0026quot;dtype\u0026quot;:\u0026quot;i2\u0026quot;,\u0026quot;bdata\u0026quot;:\u0026quot;GQE=\u0026quot;},\u0026quot;yaxis\u002 3a294a6666424b8f4", "console": [], "id": "emfo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch2 id=\"hypotheses-conclusions\"\u003E\ud83d\udca1 Hypoth\u00e8ses \u0026amp; Conclusions\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EHypoth\u00e8se 1 :\u003C/strong\u003E La majorit\u00e9 des annulations sont r\u00e9fl\u00e9chies\n\u274c \u003Cstrong\u003EInfirm\u00e9\u003C/strong\u003E \u2014 29% annulent dans l'heure. C'est un r\u00e9flexe d\u00e9fensif (\"cancel au cas o\u00f9\"), pas un rejet du produit\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EHypoth\u00e8se 2 :\u003C/strong\u003E Les utilisateurs explorent le produit pendant 7 jours avant de d\u00e9cider\n\u274c \u003Cstrong\u003EInfirm\u00e9\u003C/strong\u003E \u2014 61% ont d\u00e9j\u00e0 annul\u00e9 au jour 3. Le trial de 7 jours est trop long pour le cycle de d\u00e9cision\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EHypoth\u00e8se 3 :\u003C/strong\u003E Le taux d'annulation est anormalement \u00e9lev\u00e9\n\u26a0\ufe0f \u003Cstrong\u003ENuanc\u00e9\u003C/strong\u003E \u2014 76.4% cancel est dans la moyenne haute de l'industrie SaaS mobile (60-80%), mais le timing est le vrai probl\u00e8me\u003C/span\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ERecommandations :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003ENotification push J1\u003C/strong\u003E (\"Tu as d\u00e9couvert 12 mots ! Reviens demain pour les ancrer\") \u2014 capter les 29% qui cancel dans l'heure\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EEmail/notification J3\u003C/strong\u003E avec les progr\u00e8s concrets \u2192 capter les 32% qui cancel entre J1 et J3\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ERaccourcir le trial \u00e0 3 jours\u003C/strong\u003E et tester l'impact sur la conversion (les users d\u00e9cident avant J3 de toute fa\u00e7on)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E\ud83d\udcca Analyse par Quanty \u2014 Sprint F\u00e9v 2026\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.20.1"}, "version": "1"},
