      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "672901a2a20c7a8ed950b36dc930e9ea", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "983ccecf5ce71888d860a0e41947643f", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"5-taux-de-reussite-vs-retention-finding-principal\"\u003E5\ufe0f\u20e3 Taux de r\u00e9ussite vs R\u00e9tention \u2014 \ud83d\udd25 Finding principal\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFibery :\u003C/strong\u003E #4355 + Deep Dive #4935\n\u003Cstrong\u003EQuestion :\u003C/strong\u003E Quel lien entre le taux de m\u00e9morisation des mots et la r\u00e9tention ? Pourquoi 89% des users \u00e9chouent ?\n\u003Cstrong\u003EP\u00e9riode :\u003C/strong\u003E Septembre 2025 \u2013 F\u00e9vrier 2026\u003C/span\u003E\n\u003Chr /\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a1bf309ab19d99207b95fd981ce24171", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"methodologie\"\u003E\ud83d\udccb M\u00e9thodologie\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "95b82565970dd02fb9fde7f5d48fea3a", "console": [], "id": "bkHC", "outputs": [{"data": {"text/html": "\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Sources \u0026amp;amp; Variables (cliquer pour d\u00e9plier)\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ESource :\u003C/strong\u003E DB Eloqa \u2014 Table \u003Ccode\u003EReviewSession\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EVariables :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003EnewMemorizedCardsNumber\u003C/code\u003E : cartes pass\u00e9es au statut \"m\u00e9moris\u00e9\" via l'algorithme de r\u00e9p\u00e9tition espac\u00e9e (type Anki/Leitner)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EnewDiscoveredCardsNumber\u003C/code\u003E : nouvelles cartes vues pour la premi\u00e8re fois\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EtotalMemorizedCardsNumber\u003C/code\u003E : cumul de cartes m\u00e9moris\u00e9es \u00e0 la fin de la session\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EtotalDiscoveredCardsNumber\u003C/code\u003E : cumul de cartes d\u00e9couvertes\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ETaux de r\u00e9ussite\u003C/strong\u003E = \u003Ccode\u003ESUM(newMemorized) / SUM(newDiscovered)\u003C/code\u003E par utilisateur\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EPoint critique \u2014 M\u00e9canique de r\u00e9p\u00e9tition espac\u00e9e :\u003C/strong\u003E\nUn mot n'est compt\u00e9 \"m\u00e9moris\u00e9\" que lorsque l'utilisateur l'a correctement rappel\u00e9 \u003Cstrong\u003Eplusieurs fois \u00e0 des intervalles croissants\u003C/strong\u003E. \n\u003Cstrong\u003EIl est structurellement impossible de m\u00e9moriser un mot en 1 seule session.\u003C/strong\u003E Le syst\u00e8me est con\u00e7u pour que la m\u00e9morisation n\u00e9cessite des retours.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ER\u00e9tention D14 :\u003C/strong\u003E l'utilisateur a une session finalis\u00e9e \u226514 jours apr\u00e8s sa premi\u00e8re.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ELimites :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ELe taux de r\u00e9ussite \u0026lt;20% est \u003Cstrong\u003Ebiais\u00e9 par design\u003C/strong\u003E : les users \u00e0 1 session ne PEUVENT PAS m\u00e9moriser\u003C/li\u003E\n\u003Cli\u003ELe lien r\u00e9ussite \u2192 r\u00e9tention est corr\u00e9lationnel. Les users qui font plus de sessions m\u00e9morisent plus ET restent plus longtemps. Pas de preuve de causalit\u00e9 directe\u003C/li\u003E\n\u003Cli\u003EFiltr\u00e9 sur users avec \u003Ccode\u003EnewDiscovered \u0026gt; 0\u003C/code\u003E et \u003Ccode\u003EfirstSession \u0026lt; NOW() - 14 jours\u003C/code\u003E\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E"}, "type": "data"}]}, {"code_hash": "eddc669b7abb167983903fa2b669ae78", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"le-cliff-taux-de-reussite-vs-retention-d14\"\u003E\ud83d\udcca Le cliff : taux de r\u00e9ussite vs r\u00e9tention D14\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "1947e408083f74b8969f7082c3034cfb", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cmarimo-plotly data-figure='{\u0026quot;data\u0026quot;:[{\u0026quot;marker\u0026quot;:{\u0026quot;color\u0026quot;:\u0026quot;#a29bfe\u0026quot;},\u0026quot;name\u0026quot;:\u0026quot;Utilisateurs\u0026quot;,\u0026quot;opacity\u0026quot;:0.6,\u0026quot;x\u0026quot;:[\u0026quot;\u0026lt; 20%\u0026quot;,\u0026quot;20-40%\u0026quot;,\u0026quot;40-60%\u0026quot;,\u0026quot;60-80%\u0026quot;,\u0026quot;80%+\u0026quot;],\u0026quot;y\u0026quot;:{\u0026quot;dtype\u0026quot;:\u0026quot;i2\u0026quot;,\u0026quot;bdata\u0026quot;:\u0026quot;VCQCAd4AwADfAQ==\u0026quot;},\u0026quot;type\u0026quot;:\u0026quot;bar\u0026quot;,\u0026quot;xaxis\u0026quot;:\u0026quot;x\u0026quot;,\u0026quot;yaxis\u0026quot;:\u0026quot;y\u0026quot;},{\u0026quot;line\u0026quot;:{\u0026quot;color\u0026quot;:\u0026quot;#fd79a8\u0026quot;,\u0026quot;width\u0026quot;:4},\u0026quot;marker\u0026quot;:{\u0026quot;size\u0026quot;:14},\u0026quot;mode\u0026quot;:\ 2f64aecb9363ba", "console": [], "id": "ROlb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch2 id=\"le-cercle-vicieux\"\u003E\ud83e\udde9 Le cercle vicieux\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "2c027a9e1f65e720601dc416c89a36fd", "console": [], "id": "qnkX", "outputs": [{"data": {"text/html": "\u003Cmarimo-callout-output data-html='\u0026quot;\u0026lt;span\u0026gt;\u0026#92;n```\u0026#92;nMots trop durs \u2192 Pas de m\u00e9morisation en S1 \u2192 Pas de gratification\u0026#92;n \u2191                                              \u2193\u0026#92;n \u2514\u2500\u2500\u2500\u2500 Pas de m\u00e9morisation \u2190 Pas de retour \u2190\u2500\u2500\u2500\u2500\u2518\u0026#92;n```\u0026#92;n\u0026#92;n**Le probl\u00e8me n\u0026amp;#x27;est pas que les users sont mauvais.**  \u0026#92;nLe probl\u00e8me est que **l\u0026amp;#x27;algorithme de r\u00e9p\u00e9tition espac\u00e9e est incompatible avec des users qui ne reviennent pas** \u2014 et la majorit\u00e9 ne revient pas parce qu\u0026amp;#x27;ils n\u0026amp;#x27;ont pas de gratification de progr\u00e8s.\u0026#92;n\u0026#92;nC\u0026amp;#x27;est un probl\u00e8me de **chicken and egg** : il faut revenir pour m\u00e9moriser, mais il faut m\u00e9moriser pour avoir envie de revenir.\u0026#92;n\u0026lt;/span\u0026gt;\u0026quot;' data-kind='\u0026quot;danger\u0026quot;'\u003E\u003C/marimo-callout-output\u003E"}, "type": "data"}]}, {"code_hash": "7f813a239368bbd0fca5885021d63cbc", "console": [], "id": "TqIu", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch2 id=\"conclusions-recommandations\"\u003E\ud83d\udca1 Conclusions \u0026amp; Recommandations\u003C/h2\u003E\n\u003Ch3 id=\"le-finding\"\u003ELe finding\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003ELe seuil de 20% de taux de r\u00e9ussite est le \u003Cstrong\u003E\"aha moment\"\u003C/strong\u003E d'Eloqa. Franchir ce seuil multiplie la r\u00e9tention D14 par 15.\nMais 89% des users n'y arrivent jamais parce que 67% ne font qu'une seule session et que le syst\u00e8me de m\u00e9morisation n\u00e9cessite au minimum 8 sessions.\u003C/span\u003E\n\u003Ch3 id=\"actions-a-impact\"\u003EActions \u00e0 impact\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003E1. Feedback de progr\u00e8s en S1 avant la m\u00e9morisation r\u00e9elle\u003C/strong\u003E\n\u2192 \"3 mots d\u00e9couverts !\" / \"Tu es au niveau 1 !\" / jauge de progression visuelle\n\u2192 Donner une sensation d'avancement m\u00eame sans m\u00e9morisation effective\n\u2192 Impact : augmenter le retour S2 (de 31% vers 50%+)\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003E2. Baisser la difficult\u00e9 initiale\u003C/strong\u003E\n\u2192 Pr\u00e9senter des mots plus faciles en S1-S3 pour que les users atteignent 30-60% de r\u00e9ussite\n\u2192 Impact potentiel : \u00d715 de r\u00e9tention D14\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003E3. Notification cibl\u00e9e post-S1\u003C/strong\u003E\n\u2192 \"3 mots \u00e0 r\u00e9viser \u2014 2 min\" envoy\u00e9 24h apr\u00e8s S1\n\u2192 Impact : d\u00e9clencher la S2 critique, briser le cercle vicieux\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003E4. M\u00e9morisation acc\u00e9l\u00e9r\u00e9e pour les 5 premiers mots\u003C/strong\u003E\n\u2192 R\u00e9duire les intervalles de r\u00e9p\u00e9tition espac\u00e9e pour les 5 premiers mots\n\u2192 Permettre de \"m\u00e9moriser\" un mot d\u00e8s la S2 au lieu de la S8\n\u2192 Impact : gratification rapide, preuve de valeur du produit\u003C/span\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E\ud83d\udcca Analyse par Quanty \u2014 Sprint F\u00e9v 2026\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.20.1"}, "version": "1"},
            "runtimeConfig": null,
        };
