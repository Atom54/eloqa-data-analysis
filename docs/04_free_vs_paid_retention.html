      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

s=\"paragraph\"\u003E\u003Cstrong\u003ED\u00e9finitions :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EUtilisateur payant\u003C/strong\u003E : au moins 1 \u003Ccode\u003EPayEvent\u003C/code\u003E avec \u003Ccode\u003EperiodType = 'NORMAL'\u003C/code\u003E et \u003Ccode\u003Etype IN ('RENEWAL', 'INITIAL_PURCHASE')\u003C/code\u003E \u2192 a r\u00e9ellement pay\u00e9 (pas juste trial)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EUtilisateur gratuit\u003C/strong\u003E : au moins 1 \u003Ccode\u003EReviewSession\u003C/code\u003E finalis\u00e9e, mais pas d'\u00e9v\u00e9nement de paiement\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ER\u00e9tention D7/D14/D30\u003C/strong\u003E : l'utilisateur a une session finalis\u00e9e \u00e0 \u2265 7/14/30 jours apr\u00e8s sa premi\u00e8re session\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EVariables :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003EReviewSession.startedAt\u003C/code\u003E \u2014 date de session\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EReviewSession.finalized\u003C/code\u003E = \u003Ccode\u003Etrue\u003C/code\u003E \u2014 session termin\u00e9e (pas abandon)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.originalAppUserId\u003C/code\u003E crois\u00e9 avec \u003Ccode\u003EReviewSession.userId\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003EPremier et dernier \u003Ccode\u003EstartedAt\u003C/code\u003E par user \u2192 dur\u00e9e de vie\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ELimites :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ER\u00e9tention mesur\u00e9e par \u003Ccode\u003Emax(startedAt) - min(startedAt)\u003C/code\u003E, pas par cohortes hebdomadaires classiques. Un user actif J1 et J30 (mais pas entre) sera compt\u00e9 \"retenu D30\"\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EBiais de s\u00e9lection\u003C/strong\u003E : les payants sont par d\u00e9finition plus engag\u00e9s (ils ont choisi de payer). Corr\u00e9lation \u2260 causalit\u00e9\u003C/li\u003E\n\u003Cli\u003EFiltr\u00e9 sur \u003Ccode\u003EfirstSession \u0026gt;= '2025-09-01'\u003C/code\u003E et \u003Ccode\u003EfirstSession \u0026lt; NOW() - 30 jours\u003C/code\u003E pour laisser le temps \u00e0 D30\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E"}, "type": "data"}]}, {"code_hash": "22b176c1d504cc97b395f5615e224a5d", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"retention-d7-d14-d30\"\u003E\ud83d\udcca R\u00e9tention D7 / D14 / D30\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "89b5e129730e1b5b502408082f21249d", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cmarimo-plotly data-figure='{\u0026quot;data\u0026quot;:[{\u0026quot;alignmentgroup\u0026quot;:\u0026quot;True\u0026quot;,\u0026quot;hovertemplate\u0026quot;:\u0026quot;statut=Gratuit\u0026lt;br\u0026gt;=%{x}\u0026lt;br\u0026gt;R\u00e9tention (%)=%{text}\u0026lt;extra\u0026gt;\u0026lt;/extra\u0026gt;\u0026quot;,\u0026quot;legendgroup\u0026quot;:\u0026quot;Gratuit\u0026quot;,\u0026quot;marker\u0026quot;:{\u0026quot;color\u0026quot;:\u0026quot;#a29bfe\u0026quot;,\u0026quot;pattern\u0026quot;:{\u0026quot;shape\u0026quot;:\u0026quot;\u0026quot;}},\u0026quot;name\u0026quot;:\u0026quot;Gratuit\u0026quot;,\u0026quot;offsetgroup\u0026quot;:\u0026quot;Gratuit\u0026quot;,\u0026quot;orientation\u0026quot;:\u0026quot;v\u0026quot;,\u0026quot;showlegend\u0026quot;:true,\u0026quot;text\u0026quot;:{\u0026quot;dtype\u0026quot;:\u0026quot;f8\u0026quot;,\u0026quot;bdata\u0026quot;:\u0026quot;ZmZmZmZmMUDNzMzMzMwrQM3MzMzMzCNA\u0026quot;},\u0026quot;textposition\u0026quot;:\u0026quot;outside\u0026quot;,\u0026quot;x\u0026quot;:[\u0026quot;D7\u0026quot;,\u0026quot;D14\u0026quot;,\u0026quot;D3 \u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ERecommandation :\u003C/strong\u003E Convertir les gratuits dans les \u003Cstrong\u003E7 premiers jours\u003C/strong\u003E ou les consid\u00e9rer comme perdus. Tout effort de r\u00e9tention post-J7 pour les gratuits a un ROI quasi-nul.\u003C/span\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E\ud83d\udcca Analyse par Quanty \u2014 Sprint F\u00e9v 2026\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.20.1"}, "version": "1"},
