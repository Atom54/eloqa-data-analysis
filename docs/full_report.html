    <script data-marimo="true">
      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "ab441751518e93979dcc1f9b85faca98", "console": [], "id": "Hbol", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"sprint-data-analysis-eloqa\"\u003E\ud83d\udcca Sprint Data Analysis \u2014 Eloqa\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EP\u00e9riode :\u003C/strong\u003E Septembre 2025 \u2013 F\u00e9vrier 2026\u003Cbr /\u003E\n\u003Cstrong\u003EAuteur :\u003C/strong\u003E Quanty (Data Analyst)\u003Cbr /\u003E\n\u003Cstrong\u003EDate :\u003C/strong\u003E 28 f\u00e9vrier 2026\u003C/span\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003ECe rapport couvre 5 analyses cl\u00e9s du sprint en cours, plus un deep dive sur le finding principal.\u003Cbr /\u003E\nToutes les donn\u00e9es proviennent de la base de production Eloqa (copie read-only restaur\u00e9e quotidiennement).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "b9de04174e6254b95c3ea24ec736cff3", "console": [], "id": "MJUe", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "aa254a4a501702025c6bd1356bb3c30c", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch1 id=\"1-conversion-paywall-trial-4358\"\u003E1\ufe0f\u20e3 Conversion Paywall \u2192 Trial (#4358)\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EQuestion :\u003C/strong\u003E Quel pourcentage des utilisateurs qui voient le paywall d'onboarding lance un essai gratuit ?\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7757130b9fcdd78178b47d338146e248", "console": [], "id": "bkHC", "outputs": [{"data": {"text/html": "\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;\ud83d\udccb M\u00e9thodologie\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ESources :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EDB Eloqa\u003C/strong\u003E \u2014 Table \u003Ccode\u003EPayEvent\u003C/code\u003E : \u00e9v\u00e9nements d'achat/trial/annulation envoy\u00e9s par RevenueCat\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EAmplitude\u003C/strong\u003E (Sep-Dec 2025) \u2014 Events app-side : \u003Ccode\u003EScreen MultiStepsPaywall Viewed\u003C/code\u003E, \u003Ccode\u003ERC Trial Started\u003C/code\u003E, \u003Ccode\u003EPaywall Close Cross Clicked\u003C/code\u003E, \u003Ccode\u003EPurchase Cancelled\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EPostHog\u003C/strong\u003E (F\u00e9v 2026) \u2014 M\u00eames events apr\u00e8s migration analytics\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EVariables cl\u00e9s :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.type\u003C/code\u003E = \u003Ccode\u003EINITIAL_PURCHASE\u003C/code\u003E : premier achat ou d\u00e9marrage de trial\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.periodType\u003C/code\u003E = \u003Ccode\u003ETRIAL\u003C/code\u003E : p\u00e9riode d'essai (vs \u003Ccode\u003ENORMAL\u003C/code\u003E pour un achat direct)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.productId\u003C/code\u003E : identifie le plan (annuel \u003Ccode\u003Eabo_ann_v3_*\u003C/code\u003E ou mensuel \u003Ccode\u003Eabo_men_v3_*\u003C/code\u003E)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.purchasedAtMs\u003C/code\u003E : timestamp de l'achat c\u00f4t\u00e9 store\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ELimites :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ELes donn\u00e9es Amplitude et PostHog sont des comptages d'events analytics (pas la DB). Le croisement se fait par coh\u00e9rence des ratios, pas par user ID commun.\u003C/li\u003E\n\u003Cli\u003ELe taux exact d\u00e9pend du window de tracking \u2014 un user peut voir le paywall et convertir des jours plus tard.\u003C/li\u003E\n\u003Cli\u003ELes donn\u00e9es PostHog avant mi-f\u00e9vrier 2026 sont parcellaires (migration en cours).\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E"}, "type": "data"}]}, {"code_hash": "de86c66d245e2d07e86faa261bed8dc0", "console": [], "id": "lEQa", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-plotly data-figure='{\u0026quot;data\u0026quot;:[{\u0026quot;connector\u0026quot;:{\u0026quot;line\u0026quot;:{\u0026quot;color\u0026quot;:\u0026quot;royalblue\u0026quot;,\u0026quot;width\u0026quot;:1}},\u0026quot;marker\u0026quot;:{\u0026quot;color\u0026quot;:[\u0026quot;#6C5CE7\u0026quot;,\u0026quot;#a29bfe\u0026quot;,\u0026quot;#fd79a8\u0026quot;,\u0026quot;#00cec9\u0026quot;,\u0026quot;#fdcb6e\u0026quot;]},\u0026quot;textinfo\u0026quot;:\u0026quot;value+percent initial\u0026quot;,\u0026quot;x\u0026quot;:[5740,3786,1289,420,383],\u0026quot;y\u0026quot;:[\u0026quot;Paywall vu\u0026quot;,\u0026quot;Croix cliqu\u00e9e (65.9%)\u0026quot;,\u0026quot;Voir offres (22.4%)\u0026quot;,\u0026quot;Achat valid\u00e9 (7.3%)\u0026quot;,\u0026quot;Trial d\u00e9marr\u00e9 (6.7%)\u0026quot;],\u0026quot;type\u0026quot;:\u0026quot;funnel\u0026quot;}],\u0026quot;layout\u0026quot;:{\u0026quot;template\u0026quot;:{\u0026quot;data\u0026quot;:{\u0026quot;histogram2dcontour\u0026quot;:[{\u0026quot;type\u0026quot;:\u0026quot;histogram2dcontour\u0026quot;,\u0026quot;colorbar\u0026quot;:{\u002 strong\u003E Une session avec \u003Ccode\u003Efinalized = false\u003C/code\u003E. Cela inclut :\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EL'utilisateur ferme l'app pendant la session\u003C/li\u003E\n\u003Cli\u003EL'utilisateur navigue ailleurs sans terminer\u003C/li\u003E\n\u003Cli\u003ECrash ou perte de connexion\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ELimites :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ELe champ \u003Ccode\u003EendedAt\u003C/code\u003E n'est pas toujours renseign\u00e9 pour les sessions abandonn\u00e9es \u2192 la dur\u00e9e des abandons est peu fiable.\u003C/li\u003E\n\u003Cli\u003EUn \"abandon \u00e0 0 carte\" peut aussi \u00eatre un bug technique (session cr\u00e9\u00e9e mais jamais vraiment d\u00e9marr\u00e9e).\u003C/li\u003E\n\u003Cli\u003EFiltr\u00e9 sur \u003Ccode\u003EstartedAt \u0026gt;= '2025-06-01'\u003C/code\u003E pour avoir un historique suffisant.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E"}, "type": "data"}]}, {"code_hash": "5a099fed70f62e5d0264c69a545fae4f", "console": [], "id": "emfo", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-plotly data-figure='{\u0026quot;data\u0026quot;:[{\u0026quot;marker\u0026quot;:{\u0026quot;color\u0026quot;:\u0026quot;#a29bfe\u0026quot;},\u0026quot;name\u0026quot;:\u0026quot;Total sessions\u0026quot;,\u0026quot;opacity\u0026quot;:0.7,\u0026quot;x\u0026quot;:[\u0026quot;2025-06\u0026quot;,\u0026quot;2025-07\u0026quot;,\u0026quot;2025-08\u0026quot;,\u0026quot;2025-09\u0026quot;,\u0026quot;2025-10\u0026quot;,\u0026quot;2025-11\u0026quot;,\u0026quot;2025-12\u0026quot;,\u0026quot;2026-01\u0026quot;,\u0026quot;2026-02\u0026quot;,\u0026quot;2026-03\u0026quot;],\u0026quot;y\u0026quot;:{\u0026quot;dtype\u0026quot;:\u0026quot;i2\u0026quot;, ert contents\"\u003E\u003Chr /\u003E\n\u003Ch1 id=\"4-retention-gratuit-vs-payant-4357\"\u003E4\ufe0f\u20e3 R\u00e9tention : Gratuit vs Payant (#4357)\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EQuestion :\u003C/strong\u003E Comment la r\u00e9tention des utilisateurs payants se compare-t-elle aux gratuits ?\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "b8c60a4d77378c6a5704a795bc21d82c", "console": [], "id": "nWHF", "outputs": [{"data": {"text/html": "\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;\ud83d\udccb M\u00e9thodologie\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ESources :\u003C/strong\u003E DB Eloqa \u2014 Tables \u003Ccode\u003EReviewSession\u003C/code\u003E + \u003Ccode\u003EPayEvent\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ED\u00e9finitions :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EUtilisateur payant\u003C/strong\u003E : a au moins un \u003Ccode\u003EPayEvent\u003C/code\u003E avec \u003Ccode\u003EperiodType = 'NORMAL'\u003C/code\u003E et \u003Ccode\u003Etype IN ('RENEWAL', 'INITIAL_PURCHASE')\u003C/code\u003E \u2192 a effectivement pay\u00e9 (pas juste un trial)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EUtilisateur gratuit\u003C/strong\u003E : a au moins une \u003Ccode\u003EReviewSession\u003C/code\u003E finalis\u00e9e mais n'appara\u00eet pas comme payant\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ER\u00e9tention D7/D14/D30\u003C/strong\u003E : l'utilisateur a une \u003Ccode\u003EReviewSession\u003C/code\u003E finalis\u00e9e \u00e0 au moins 7/14/30 jours apr\u00e8s sa premi\u00e8re session\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EVariables :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003EReviewSession.startedAt\u003C/code\u003E \u2014 date de la session\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EReviewSession.finalized\u003C/code\u003E = \u003Ccode\u003Etrue\u003C/code\u003E \u2014 session compl\u00e8te (pas abandonn\u00e9e)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EPayEvent.originalAppUserId\u003C/code\u003E \u2192 croisement avec \u003Ccode\u003EReviewSession.userId\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003EPremier et dernier \u003Ccode\u003EstartedAt\u003C/code\u003E par user \u2192 dur\u00e9e de vie\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ELimites :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ELa r\u00e9tention est mesur\u00e9e par la diff\u00e9rence entre premi\u00e8re et derni\u00e8re session, pas par des cohortes hebdomadaires classiques. Un user actif J1 et J30 mais pas entre les deux sera compt\u00e9 comme \"retenu D30\".\u003C/li\u003E\n\u003Cli\u003EBiais de s\u00e9lection : les payants sont par d\u00e9finition des users plus engag\u00e9s (ils ont d\u00e9cid\u00e9 de payer). La corr\u00e9lation paiement \u2192 r\u00e9tention n'implique pas causalit\u00e9.\u003C/li\u003E\n\u003Cli\u003EFiltr\u00e9 sur \u003Ccode\u003EfirstSession \u0026gt;= '2025-09-01'\u003C/code\u003E et \u003Ccode\u003EfirstSession \u0026lt; NOW() - 30 jours\u003C/code\u003E pour laisser le temps \u00e0 la r\u00e9tention D30.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E"}, "type": "data"}]}, {"code_hash": "860826ecf954851e6cc95cffcd76b6a6", "console": [], "id": "iLit", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;f "paragraph\"\u003ELes payants retiennent \u003Cstrong\u003E3.6x \u00e0 4.6x mieux\u003C/strong\u003E. Le gap s'\u00e9largit avec le temps :\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ED7 : 62.5% vs 17.4% (\u00d73.6)\u003C/li\u003E\n\u003Cli\u003ED14 : 56.1% vs 13.8% (\u00d74.1)  \u003C/li\u003E\n\u003Cli\u003ED30 : \u003Cstrong\u003E45.5% vs 9.9%\u003C/strong\u003E (\u00d74.6)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ESeulement 1 user gratuit sur 10 revient apr\u00e8s 30 jours.\u003C/strong\u003E Sans conversion rapide (J1-J7), ils sont perdus.\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "94984cfa0d4500ae5ce7a575a0db86e9", "console": [], "id": "ZHCJ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch1 id=\"5-taux-de-reussite-vs-retention-4355-finding-principal\"\u003E5\ufe0f\u20e3 Taux de r\u00e9ussite vs R\u00e9tention (#4355) \u2014 \ud83d\udd25 Finding principal\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EQuestion :\u003C/strong\u003E Quel lien entre le taux de m\u00e9morisation des mots et la r\u00e9tention des utilisateurs ?\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "36e780665018b84735daa05ee97bbd32", "console": [], "id": "ROlb", "outputs": [{"data": {"text/html": "\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;\ud83d\udccb M\u00e9thodologie\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ESource :\u003C/strong\u003E DB Eloqa \u2014 Table \u003Ccode\u003EReviewSession\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EVariables :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003EnewMemorizedCardsNumber\u003C/code\u003E : cartes pass\u00e9es au statut \"m\u00e9moris\u00e9\" pendant la session (via l'algorithme de r\u00e9p\u00e9tition espac\u00e9e)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EnewDiscoveredCardsNumber\u003C/code\u003E : nouvelles cartes vues pour la premi\u00e8re fois\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EtotalMemorizedCardsNumber\u003C/code\u003E : total cumul\u00e9 de cartes m\u00e9moris\u00e9es \u00e0 la fin de la session\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EtotalDiscoveredCardsNumber\u003C/code\u003E : total cumul\u00e9 de cartes d\u00e9couvertes\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ETaux de r\u00e9ussite\u003C/strong\u003E = \u003Ccode\u003ESUM(newMemorized) / SUM(newDiscovered)\u003C/code\u003E par utilisateur\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ED\u00e9finition de \"m\u00e9morisation\" :\u003C/strong\u003E\u003Cbr /\u003E\nEloqa utilise un algorithme de \u003Cstrong\u003Er\u00e9p\u00e9tition espac\u00e9e\u003C/strong\u003E (type Anki/Leitner). Un mot n'est consid\u00e9r\u00e9 \"m\u00e9moris\u00e9\" que lorsque l'utilisateur l'a correctement rappel\u00e9 plusieurs fois \u00e0 des intervalles croissants. \u003Cstrong\u003EIl est structurellement impossible de m\u00e9moriser un mot en 1 seule session\u003C/strong\u003E \u2014 il faut le revoir dans des sessions ult\u00e9rieures.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ER\u00e9tention D14 :\u003C/strong\u003E l'utilisateur a une session finalis\u00e9e \u00e0 \u226514 jours de sa premi\u00e8re.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ELimites :\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ELe taux de r\u00e9ussite \u0026lt; 20% est biais\u00e9 par les users \u00e0 1 session qui ne PEUVENT PAS m\u00e9moriser (by design).\u003C/li\u003E\n\u003Cli\u003ELe lien r\u00e9ussite \u2192 r\u00e9tention est corr\u00e9lationnel : les users qui font plus de sessions m\u00e9morisent plus ET restent plus longtemps. La causalit\u00e9 n'est pas prouv\u00e9e.\u003C/li\u003E\n\u003Cli\u003EFiltr\u00e9 sur users avec \u003Ccode\u003EnewDiscovered \u0026gt; 0\u003C/code\u003E et \u003Ccode\u003EfirstSession \u0026lt; NOW() - 14 jours\u003C/code\u003E.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E"}, "type": "data"}]}, {"code_hash": "d16ed800198ae1ca582a9eee8559a70b", "console": [], "id": "qnkX", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-plotly data-figure='{\u0026quot;data\u0026quot;:[{\u0026quot;marker\u0026quot;:{\u0026quot;color\u0026quot;:\u0026quot;#a29bfe\u0026quot;},\u0026quot;name\u0026quot;:\u0026quot;Users\u0026quot;,\u0026quot;opacity\u0026quot;:0.6,\u0026quot;x\u0026quot;:[\u0026quot;\u0026lt; 20%\u0026quot;,\u0026quot;20-40%\u0026quot;,\u0026quot;40-60%\u0026quot;,\u0026quot;60-80%\u0026quot;,\u0026quot;80%+\u0026quot;],\u0026quot;y\u0026quot;:{\u0026quot;dtype\u0026quot;:\u0026quot;i2\u0026quot;,\u0026quot;bdata\u0026quot;:\u0026quot;VCQCAd4AwADfAQ==\u0026quot;},\u0026quot;type\u0026quot;:\u0026quot;bar\u0026quot;,\u0026quot;xaxis\u0026quot;:\u0026quot;x\u0026quot;,\u0026quot;yaxis\u0026quot;:\u0026quot;y\u0026quot;},{\u0026quot;line\u0026quot;:{\u0026quot;color\u0026quot;:\u0026quot;#fd79a8\u0026quot;,\u0026quot;width\u0026quot;:4},\u0026quot;marker\u0026quot;:{\u0026quot;size\u0026quot;:12},\u0026quot;mode\u0026quot;:\u0026quot;lines+markers+text\u0026quot;,\u0026quot;name\u0026quot;:\u0026quot;R\u00e9tention D14 (%)\u0026quot;,\u0026quot;text\u0026quot;:[\u0026quot;5.7%\u0026quot;,\u0026quot;85.7%\u0026quot;,\u0
